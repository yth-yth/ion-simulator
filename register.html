<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IonSimulator - 注册</title>
    <style>
        :root { --primary-blue: #00cfff; --cyan: #4ecca3; --gold: #f0c040; --bg-blue: #090e1f; --text: #eaeaea; --blue-glow: 0 0 10px rgba(0, 207, 255, 0.6); }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; background: url('images/背景照片.png') no-repeat center center; background-size: cover; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        
        /* 使用 index.html 中相同的面板样式 */
        .cyber-panel {
            background: url('images/框框.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 50px 60px; display: flex; flex-direction: column; align-items: center;
            width: 450px;
        }
        .panel-title { font-size: 24px; color: var(--cyan); margin-bottom: 30px; text-shadow: 0 0 10px rgba(78, 204, 163, 0.6); font-weight: bold; }
        
        .input-group { margin-bottom: 25px; width: 100%; display: flex; align-items: center; }
        .input-group label { width: 80px; color: var(--primary-blue); font-weight: bold; font-size: 18px; }
        .cyber-input { flex: 1; padding: 12px 15px; font-size: 16px; background: rgba(9, 14, 31, 0.8); border: 1px solid var(--primary-blue); color: var(--text); border-radius: 4px; box-shadow: inset 0 0 10px rgba(0, 207, 255, 0.2); outline: none; }
        
        .btn-cyber { background: rgba(0, 207, 255, 0.1); color: var(--primary-blue); border: 1px solid var(--primary-blue); padding: 15px 40px; margin-top: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn-cyber:hover { background: rgba(0, 207, 255, 0.3); box-shadow: 0 0 20px rgba(0, 207, 255, 0.5); color: #fff; }
    </style>
</head>
<body>
    <div class="cyber-panel">
        <div class="panel-title">创建新节点</div>
        <div class="input-group">
            <label>新用户</label>
            <input type="text" id="reg-user" class="cyber-input" placeholder="设置用户名">
        </div>
        <div class="input-group">
            <label>密钥</label>
            <input type="password" id="reg-pass" class="cyber-input" placeholder="设置访问密钥">
        </div>
        <button class="btn-cyber" onclick="handleRegister()">创建账号</button>
        <p style="margin-top: 20px; color: var(--text);">已有账号？<a href="login.html" style="color: var(--cyan);">返回登录</a></p>
    </div>

    <script>
        function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            if(!user || !pass) return alert("请完整填写信息");

            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            if(users.find(u => u.username === user)) return alert("该节点 ID 已存在");

            users.push({ username: user, password: pass });
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            alert("注册成功！");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
