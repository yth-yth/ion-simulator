<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激光参数调控 - IonSimulator</title>

    <link rel="stylesheet" href="../css/simulator.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="../js/qubit_simulator.js"></script>

    <style>
        .laser-grid {
            display: grid; 
            /* 🌟 修复 1：将左侧列宽从 320px 加宽到 450px，给图片充裕的展示空间 */
            grid-template-columns: 450px 1fr; 
            gap: 20px;
            padding: 16px; height: calc(100vh - 105px); box-sizing: border-box;
        }
        .left-col { display: flex; flex-direction: column; gap: 16px; height: 100%; }
        .img-box {
            flex: 1; border: 1px solid var(--primary-blue);
            box-shadow: var(--blue-glow), inset 0 0 20px rgba(0, 207, 255, 0.1);
            background: var(--panel-blue); border-radius: 4px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 1; }

        .right-col { display: flex; flex-direction: column; gap: 16px; height: 100%; }
        .right-top { flex: 1; display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; min-height: 0; }
        .right-bottom { flex: 1; min-height: 0; }

        /* --- 赛博朋克参数表格专属样式 --- */
        .cyber-table-container {
            background: url('../images/框框.png') no-repeat center center; 
            background-size: 100% 100%; padding: 35px 35px 25px 35px;
            display: flex; flex-direction: column;
        }
        .cyber-table { 
            width: 100%; height: 100%; border-collapse: collapse; 
            /* 🌟 修复 2：将表格的基础字号由 0.85rem 调大到 1.1rem */
            font-size: 1rem; 
            color: var(--text); 
        }
        .cyber-table th, .cyber-table td { border: 1px solid rgba(0, 207, 255, 0.4); text-align: center; padding: 6px; }
        .cyber-table .label-col { background: rgba(0, 207, 255, 0.1); color: var(--cyan); font-weight: bold; width: 20%; }
        
        .cyber-table input, .cyber-table select {
            width: 100%; height: 100%; background: transparent; border: none;
            color: var(--gold); text-align: center; outline: none; font-family: inherit;
            /* 🌟 同步放大输入框内的字号，并加粗，让数字更醒目 */
            font-size: 1rem; 
            font-weight: bold;
        }
        .cyber-table input:focus { background: rgba(0, 207, 255, 0.2); }
        .cyber-table select { cursor: pointer; text-align-last: center; appearance: none; }
        .cyber-table select option { background: var(--bg-blue); color: var(--text); }

        /* 🌟 将表格里的按钮也同步放大一点 */
        .btn-small { padding: 8px 16px; font-size: 0.95rem; width: 90%; margin: 0 auto; cursor: pointer; }

        /* ================= 🌟 核心定制：去除文字标题，完美适配切图 ================= */
        
        #bloch-card {
            background: url('../images/布洛赫球方形框.png') no-repeat center center !important;
            background-size: 100% 100% !important;
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 80px 20px 20px 20px !important; 
            /* 🌟 允许球体放大后稍微超出原本的绘图限制区 */
            overflow: visible !important; 
        }

        #bloch-card .bloch-wrap {
            /* 🌟 修复 3：使用 scale(1.35) 暴力放大 1.35 倍球体，并用 translateY(45px) 把它狠狠往下压 */
            transform: translateY(0px) scale(1.1) !important;
        }

        #pop-card {
            padding-top: 70px !important; 
        }
        
    </style>
</head>
<body>

    <div class="header">
        <h1 style="cursor: pointer;" onclick="window.location.href='../index.html'">⚛ IonSimulator</h1>
        <span>囚禁离子量子操作 · 教学演示 (赛博朋克版)</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active">激光参数调控序列</button>
    </div>

    <div class="laser-grid">
        <div class="left-col">
            <div class="img-box"><img src="../images/正面.jpg" alt="陷阱模型上"></div>
            <div class="img-box"><img src="../images/侧面.jpg" alt="陷阱模型下"></div>
        </div>

        <div class="right-col">
            <div class="right-top">
                <div class="cyber-table-container">
                    <table class="cyber-table" id="seq-table">
                        <tr>
                            <th class="label-col">数目</th>
                            <th colspan="5" style="text-align: right; padding-right: 10px;">
                                <button class="btn btn-small" style="width: auto;" onclick="runLaserSequence()">▶ 开始全局操作</button>
                            </th>
                        </tr>
                        <tr><td class="label-col">光次数</td>
                            <td><input type="text" value="1" disabled></td><td><input type="text" value="2" disabled></td>
                            <td><input type="text" value="3" disabled></td><td><input type="text" value="4" disabled></td><td><input type="text" value="5" disabled></td>
                        </tr>
                        <tr><td class="label-col">激光类型</td>
                            <td><select id="type-1"><option value="729nm" selected>729nm</option><option value="397nm_sigma_plus">西格玛+</option><option value="397nm_sigma_minus">西格玛-</option><option value="off">关闭</option></select></td>
                            <td><select id="type-2"><option value="729nm">729nm</option><option value="397nm_sigma_plus" selected>西格玛+</option><option value="397nm_sigma_minus">西格玛-</option><option value="off">关闭</option></select></td>
                            <td><select id="type-3"><option value="729nm" selected>729nm</option><option value="397nm_sigma_plus">西格玛+</option><option value="397nm_sigma_minus">西格玛-</option><option value="off">关闭</option></select></td>
                            <td><select id="type-4"><option value="729nm">729nm</option><option value="397nm_sigma_plus">西格玛+</option><option value="397nm_sigma_minus">西格玛-</option><option value="off" selected>关闭</option></select></td>
                            <td><select id="type-5"><option value="729nm">729nm</option><option value="397nm_sigma_plus">西格玛+</option><option value="397nm_sigma_minus">西格玛-</option><option value="off" selected>关闭</option></select></td>
                        </tr>
                        <tr><td class="label-col">相位</td>
                            <td><input type="text" id="pha-1" value="0"></td><td><input type="text" id="pha-2" value="0"></td>
                            <td><input type="text" id="pha-3" value="0"></td><td><input type="text" id="pha-4" value="0"></td><td><input type="text" id="pha-5" value="0"></td>
                        </tr>
                        <tr><td class="label-col">激光失谐</td>
                            <td><input type="text" id="det-1" value="0.0"></td><td><input type="text" id="det-2" value="3.0"></td>
                            <td><input type="text" id="det-3" value="2.0"></td><td><input type="text" id="det-4" value="0.0"></td><td><input type="text" id="det-5" value="0.0"></td>
                        </tr>
                        <tr><td class="label-col">激光功率(Ω)</td>
                            <td><input type="text" id="pow-1" value="9.0"></td><td><input type="text" id="pow-2" value="3.0"></td>
                            <td><input type="text" id="pow-3" value="2.0"></td><td><input type="text" id="pow-4" value="0.0"></td><td><input type="text" id="pow-5" value="0.0"></td>
                        </tr>
                        <tr><td class="label-col">作用时间(μs)</td>
                            <td><input type="text" id="dur-1" value="1.0"></td><td><input type="text" id="dur-2" value="1.0"></td>
                            <td><input type="text" id="dur-3" value="2.0"></td><td><input type="text" id="dur-4" value="0.0"></td><td><input type="text" id="dur-5" value="0.0"></td>
                        </tr>
                    </table>
                </div>

                <div class="chart-card" id="bloch-card">
                    <div class="bloch-wrap" id="bloch-sphere"></div>
                </div>
            </div>

            <div class="right-bottom">
                <div class="chart-card" id="pop-card" style="height: 100%; min-height: 250px !important;">
                    <canvas id="chart-laser-pop"></canvas>
                </div>
            </div>

        </div>
    </div>

    <div style="display: none;">
        <div id="page-rabi" class="active"></div><div id="page-entangle"></div><div id="page-theory"></div>
        <select id="rabi-preset"></select><input id="rabi-omega" value="1.57"><input id="rabi-delta" value="0.00">
        <input id="rabi-tmax" value="10.0"><input id="rabi-gamma" value="0.00"><button id="btn-rabi-reset"></button>
        <canvas id="chart-rabi-pop"></canvas><div id="tip-rabi"></div><div id="chat-box-rabi"></div><input id="chat-in-rabi">
        <select id="ent-preset"></select><input id="ent-eta" value="0.1"><input id="ent-omega" value="3.14"><input id="ent-delta" value="0.1">
        <input id="ent-tmax" value="40"><input id="ent-n0" value="0"><input id="ent-gamma" value="0">
        <button id="btn-ent-reset"></button>
        <canvas id="chart-ent-pop"></canvas><canvas id="chart-ent-conc"></canvas><canvas id="chart-ent-phase"></canvas>
        <svg id="gauge-svg"></svg><div id="gauge-text"></div><div id="gauge-status"></div>
        <div id="tip-entangle"></div><div id="chat-box-ent"></div><input id="chat-in-ent">
    </div>

    <script src="../js/simulator.js"></script>

    <script>
        let laserChart = null;

        function parseMathStr(str) {
            if (!str) return 0;
            let expr = str.replace(/π/g, 'Math.PI').replace(/pi/gi, 'Math.PI');
            try { return eval(expr); } catch(e) { return 0; }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('chart-laser-pop').getContext('2d');
            laserChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [
                        { label: '|0⟩ 态 (P_g)', data: [], borderColor: '#f0c040', backgroundColor: '#f0c04020', borderWidth: 2, pointRadius: 0, tension: 0.1 },
                        { label: '|1⟩ 态 (P_e)', data: [], borderColor: '#00cfff', backgroundColor: '#00cfff20', borderWidth: 2, pointRadius: 0, tension: 0.1, borderDash: [5, 5] }
                ]},
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: {
                        x: { title: { display: true, text: '时间 (μs)', color: '#8899aa' }, ticks: { color: '#8899aa', font: { size: 14 } }, grid: { color: '#ffffff10' } },
                        y: { min: -0.05, max: 1.05, title: { display: true, text: '布居数', color: '#8899aa' }, ticks: { color: '#8899aa', font: { size: 14 } }, grid: { color: '#ffffff10' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            setTimeout(runLaserSequence, 100);
        });

        function runLaserSequence() {
            const sequence = [];
            
            for(let i = 1; i <= 5; i++) {
                let type = document.getElementById('type-'+i).value;
                let duration = parseFloat(document.getElementById('dur-'+i).value);
                let omega = parseFloat(document.getElementById('pow-'+i).value);
                let detuning = parseFloat(document.getElementById('det-'+i).value);
                let phase = parseMathStr(document.getElementById('pha-'+i).value);
                
                if(!isNaN(duration) && duration > 0) {
                    sequence.push({
                        laser: type,
                        duration: duration,
                        omega: isNaN(omega) ? 0 : omega,
                        detuning: isNaN(detuning) ? 0 : detuning,
                        phase: phase
                    });
                }
            }

            if(sequence.length === 0) {
                alert("序列为空！请至少在一个脉冲中输入大于 0 的作用时间。");
                return;
            }

            const sim = new Simulator729nm();
            const res = sim.run_sequence(sequence, 'g1', 100); 

            laserChart.data.labels = res.t.map(t => t.toFixed(2));
            laserChart.data.datasets[0].data = res.P_g1;
            laserChart.data.datasets[1].data = res.P_g2;
            laserChart.update('none');

            updateBlochSphere(res);
        }
    </script>
</body>
</html>
