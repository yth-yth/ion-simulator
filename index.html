<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IonSimulator - 量子计算之旅</title>
    <style>
        /* ================== 赛博朋克全局变量 ================== */
        :root {
            --primary-blue: #00cfff; 
            --cyan: #4ecca3; 
            --gold: #f0c040; 
            --bg-blue: #090e1f; 
            --text: #eaeaea; 
            --blue-glow: 0 0 10px rgba(0, 207, 255, 0.6);
            --cyan-glow: 0 0 10px rgba(78, 204, 163, 0.6);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: url('images/背景照片.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ================== 顶部导航 & 返回按钮 ================== */
        .top-bar {
            height: 60px; width: 100%;
            background: linear-gradient(180deg, rgba(15,52,96,0.8), rgba(22,33,62,0.8));
            border-bottom: 2px solid var(--primary-blue);
            box-shadow: 0 4px 10px rgba(0, 207, 255, 0.3);
            display: flex; align-items: center; padding: 0 30px;
            box-sizing: border-box; position: absolute; top: 0; left: 0; z-index: 100;
        }
        .btn-back {
            color: var(--cyan); font-size: 16px; font-weight: bold; cursor: pointer;
            display: none; text-shadow: var(--cyan-glow); transition: all 0.2s;
        }
        .btn-back:hover { color: #fff; text-shadow: 0 0 15px var(--cyan); }
        .btn-back::before { content: '< 返回上级'; }

        /* ================== 屏幕容器 ================== */
        .screen-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            margin-top: 60px; position: relative;
        }
        .screen {
            display: none; flex-direction: column; align-items: center;
            width: 80%; max-width: 900px; animation: fadeIn 0.4s ease-out;
        }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* ================== 赛博朋克按钮组件 ================== */
        .btn-cyber {
            background: rgba(0, 207, 255, 0.1);
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
            box-shadow: var(--blue-glow);
            font-size: 20px; font-weight: bold; letter-spacing: 2px;
            padding: 20px 60px; margin: 15px; width: 320px;
            text-align: center; cursor: pointer; border-radius: 4px;
            transition: all 0.2s; text-shadow: var(--blue-glow);
        }
        .btn-cyber:hover {
            background: rgba(0, 207, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 207, 255, 0.8);
            color: #fff; transform: translateY(-2px);
        }
        .btn-cyber:active { transform: translateY(1px); }

        /* 特殊高亮按钮 (如：考试模式/开始实验) */
        .btn-cyber.gold {
            background: rgba(240, 192, 64, 0.1);
            color: var(--gold); border-color: var(--gold);
            box-shadow: 0 0 10px rgba(240, 192, 64, 0.6); text-shadow: 0 0 10px rgba(240, 192, 64, 0.6);
        }
        .btn-cyber.gold:hover { background: rgba(240, 192, 64, 0.3); box-shadow: 0 0 20px rgba(240, 192, 64, 0.8); color: #fff; }

        /* ================== 科幻面板框 (复用你的框框图片) ================== */
        .cyber-panel {
            background: url('images/框框.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 50px 60px; display: flex; flex-direction: column; align-items: center;
        }
        .panel-title {
            font-size: 24px; color: var(--cyan); margin-bottom: 30px;
            text-shadow: var(--cyan-glow); font-weight: bold; letter-spacing: 2px;
        }

        /* ================== 登录表单样式 ================== */
        .input-group { margin-bottom: 25px; width: 100%; display: flex; align-items: center; }
        .input-group label {
            width: 80px; color: var(--primary-blue); font-weight: bold;
            text-shadow: var(--blue-glow); font-size: 18px;
        }
        .cyber-input {
            flex: 1; padding: 12px 15px; font-size: 16px;
            background: rgba(9, 14, 31, 0.8); border: 1px solid var(--primary-blue);
            color: var(--text); border-radius: 4px; box-shadow: inset 0 0 10px rgba(0, 207, 255, 0.2);
            outline: none; transition: all 0.3s;
        }
        .cyber-input:focus { border-color: var(--cyan); box-shadow: inset 0 0 15px rgba(78, 204, 163, 0.4); }

        /* ================== 宫格布局 (知识库 & 实验操作) ================== */
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
        }
        .grid-container.cols-4 { grid-template-columns: repeat(4, 1fr); }
        
        .grid-btn {
            background: rgba(0, 207, 255, 0.05); border: 1px solid rgba(0, 207, 255, 0.4);
            color: var(--text); padding: 25px 10px; font-size: 18px; text-align: center;
            cursor: pointer; transition: all 0.3s; border-radius: 4px;
        }
        .grid-btn:hover {
            background: rgba(0, 207, 255, 0.2); border-color: var(--primary-blue);
            box-shadow: var(--blue-glow); color: var(--primary-blue); transform: scale(1.05);
        }
        
        .section-title {
            color: var(--cyan); text-shadow: var(--cyan-glow); font-size: 20px; 
            margin: 30px 0 15px 0; align-self: flex-start; width: 100%; border-bottom: 1px solid rgba(78, 204, 163, 0.3); padding-bottom: 5px;
        }
    </style>
</head>
<body>
 
    <button onclick="logout()" style="position:fixed; top:10px; right:10px; background:transparent; color:#f0c040; border:1px solid #f0c040;">退出系统</button>
    
    <div class="top-bar">
        <div class="btn-back" id="btn-back" onclick="goBack()"></div>
    </div>

    <div class="screen-container">
        
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 48px; color: var(--primary-blue); text-shadow: var(--blue-glow); margin-bottom: 50px; letter-spacing: 5px;">IonSimulator</h1>
            <button class="btn-cyber" onclick="goTo('screen-mode')">开始量子计算之旅</button>
        </div>

        <div id="screen-mode" class="screen">
            <button class="btn-cyber" onclick="goTo('screen-main-menu')">练习模式</button>
            <button class="btn-cyber gold" onclick="goTo('screen-main-menu')">考试模式</button>
        </div>

        <div id="screen-login" class="screen">
            <div class="cyber-panel" style="width: 450px;">
                <div class="panel-title">系统身份认证</div>
                <div class="input-group">
                    <label>学号</label>
                    <input type="text" class="cyber-input" placeholder="输入节点识别码">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" class="cyber-input" placeholder="输入访问密钥">
                </div>
                <button class="btn-cyber" style="width: 100%; margin-top: 20px;" onclick="goTo('screen-main-menu')">登 录</button>
            </div>
        </div>

        <div id="screen-main-menu" class="screen">
            <button class="btn-cyber" onclick="goTo('screen-principles')">实验原理数据库</button>
            <button class="btn-cyber cyan" onclick="goTo('screen-experiments')" style="border-color: var(--cyan); color: var(--cyan); box-shadow: var(--cyan-glow);">进入实验操作区</button>
        </div>

        <div id="screen-principles" class="screen" style="width: 90%;">
            <div class="cyber-panel" style="width: 100%; padding: 30px;">
                <div class="section-title" style="margin-top: 0;">理论知识库</div>
                <div class="grid-container cols-4">
                    <div class="grid-btn">离子阱原理</div>
                    <div class="grid-btn">无耗散系统</div>
                    <div class="grid-btn">有耗散系统</div>
                    <div class="grid-btn">量子门理论</div>
                </div>

                <div class="section-title">理论考核答题</div>
                <div class="grid-container cols-4">
                    <div class="grid-btn">基础原理考核</div>
                    <div class="grid-btn">哈密顿量解析</div>
                    <div class="grid-btn">演化方程计算</div>
                    <div class="grid-btn">保真度分析</div>
                </div>
            </div>
        </div>

        <div id="screen-experiments" class="screen" style="width: 90%;">
            <div class="cyber-panel" style="width: 100%; padding: 30px;">
                <div class="panel-title" style="margin-bottom: 20px;">量子实验模块选择</div>
                <div class="grid-container">
                    <div class="grid-btn" onclick="window.location.href='pages/ion_loading.html'">离子载入系统</div>
                    <div class="grid-btn" onclick="window.location.href='pages/laser_control.html'">激光参数调控</div>
                    <div class="grid-btn" onclick="window.location.href='pages/rabi.html'">单离子 Rabi 振荡</div>
                    
                    <div class="grid-btn" onclick="window.location.href='pages/ep_point.html'">EP 点探测</div>
                    <div class="grid-btn" onclick="window.location.href='pages/damped.html'">有耗散演化</div>
                    <div class="grid-btn" onclick="window.location.href='pages/laser_control.html'">任意激光组合</div>
                    
                    <div class="grid-btn" onclick="window.location.href='pages/entangle.html'">两离子双比特实验</div>
                    <div class="grid-btn" onclick="window.location.href='pages/gate_builder.html'">量子逻辑门构建</div>
                    <div class="grid-btn" onclick="window.location.href='pages/gate_builder.html'">量子线路综合设计</div>
                </div>
            </div>
        </div>

    </div>

    <script>
    // 页面加载前执行检查
    (function checkAuth() {
        if (localStorage.getItem('isAuthenticated') !== 'true') {
            window.location.href = 'login.html';
        }
    })();

        // 简易路由栈，处理界面内的前进和后退
        let historyStack = ['screen-home'];

        function updateBackButton() {
            const backBtn = document.getElementById('btn-back');
            if (historyStack.length > 1) {
                backBtn.style.display = 'block';
            } else {
                backBtn.style.display = 'none';
            }
        }

        function goTo(targetScreenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(targetScreenId).classList.add('active');
            historyStack.push(targetScreenId);
            updateBackButton();
        }

        function goBack() {
            if (historyStack.length > 1) {
                historyStack.pop();
                const previousScreenId = historyStack[historyStack.length - 1];
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });
                document.getElementById(previousScreenId).classList.add('active');
                updateBackButton();
            }
        }
        function logout() {
            localStorage.removeItem('isAuthenticated');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
